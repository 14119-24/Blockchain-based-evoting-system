# Render.yaml for PHP Application

# This file contains configuration for deploying a PHP application to Render.

services:
  - type: web
    name: Blockchain E-Voting System
    env: php
    buildCommand: ""
    startCommand: "php -S 0.0.0.0:8080 -t ."
    autoDeploy: true
    plan: free
    regions: 1
    envVars: 
      - key: APP_ENV
        value: production