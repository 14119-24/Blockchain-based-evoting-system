# Render.yaml for PHP Application\n\n# This file contains configuration for deploying a PHP application to Render.\n\nservices:\n  - type: web\n    name: My PHP App\n    env: php\n    buildCommand: "composer install"\n    startCommand: "php -S 0.0.0.0:10000 -t public"\n    autoDeploy: true\n    plan: free\n    regions: 1\n    envVars: \n      - key: APP_ENV\n        value: production\n