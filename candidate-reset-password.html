<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Candidate Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/api-helper.js"></script>
    <style>
        .password-reset-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .password-reset-container h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }

        .password-reset-container p {
            color: var(--gray-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .password-input {
            position: relative;
        }

        .password-input input {
            width: 100%;
            padding: 0.75rem;
            padding-right: 2.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .password-input input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-color);
        }

        .toggle-password:hover {
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .btn-submit:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message i {
            color: #10b981;
            margin-right: 0.5rem;
        }

        .error-message {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message i {
            color: #ef4444;
            margin-right: 0.5rem;
        }

        .loading {
            display: none;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            transition: width 0.3s, background 0.3s;
        }

        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: var(--gray-color);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="password-reset-container">
        <h1><i class="fas fa-lock"></i> Create New Password</h1>
        <p>Enter your new password below. Make sure it's at least 8 characters long.</p>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div class="error-message" id="invalidTokenMessage" style="display: none;">
            <i class="fas fa-exclamation-circle"></i>
            <span>Invalid or expired reset link. <a href="candidate-forgot-password.html" style="color: #dc2626; font-weight: bold;">Request a new one</a></span>
        </div>

        <form id="resetPasswordForm" onsubmit="submitResetPassword(event)" class="hidden" id="resetForm">
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> New Password
                </label>
                <div class="password-input">
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your new password" minlength="8"
                           oninput="checkPasswordStrength()">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="password-strength-fill" id="strengthFill"></div>
                </div>
                <div class="password-strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label for="confirm-password">
                    <i class="fas fa-lock"></i> Confirm Password
                </label>
                <div class="password-input">
                    <input type="password" id="confirm-password" name="confirm_password" required 
                           placeholder="Confirm your new password" minlength="8">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirm-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-save"></i> Reset Password
            </button>

            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Resetting password...
            </div>
        </form>

        <a href="candidate-register.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <script>
        let resetToken = null;

        // Extract token from URL
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            resetToken = params.get('token');

            if (!resetToken) {
                document.getElementById('invalidTokenMessage').style.display = 'block';
                return;
            }

            // Verify token
            try {
                const response = await fetch(getApiUrl('api/candidate-auth.php?action=verify_reset_token'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ token: resetToken })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resetForm').classList.remove('hidden');
                } else {
                    document.getElementById('invalidTokenMessage').style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('invalidTokenMessage').style.display = 'block';
            }
        });

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            let strength = 0;
            if (password.length >= 8) strength += 20;
            if (/[a-z]/.test(password)) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 20;

            fill.style.width = strength + '%';

            if (strength < 40) {
                fill.style.background = '#ef4444';
                text.textContent = 'Weak password';
            } else if (strength < 70) {
                fill.style.background = '#f59e0b';
                text.textContent = 'Fair password';
            } else if (strength < 90) {
                fill.style.background = '#3b82f6';
                text.textContent = 'Good password';
            } else {
                fill.style.background = '#10b981';
                text.textContent = 'Strong password';
            }
        }

        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const isPassword = field.type === 'password';
            field.type = isPassword ? 'text' : 'password';
        }

        async function submitResetPassword(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            // Validate
            if (password !== confirmPassword) {
                document.getElementById('errorText').textContent = 'Passwords do not match';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                document.getElementById('errorText').textContent = 'Password must be at least 8 characters';
                errorMessage.style.display = 'block';
                return;
            }

            // Clear messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            // Show loading
            submitBtn.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(getApiUrl('api/candidate-auth.php?action=reset_password'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        token: resetToken,
                        new_password: password,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('successText').textContent = data.message + ' <a href="candidate-register.html" style="color: #10b981; font-weight: bold; text-decoration: none;">Click here to login</a>';
                    successMessage.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message + ' <a href="candidate-register.html" style="color: #10b981; font-weight: bold; text-decoration: underline;">Click here to login</a>';
                    successMessage.style.display = 'block';
                    document.getElementById('resetForm').style.display = 'none';

                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'candidate-register. html';
                    }, 3000);
                } else {
                    document.getElementById('errorText').textContent = data.error || 'Failed to reset password. Please try again.';
                    errorMessage.style.display = 'block';

                    submitBtn.style.display = 'block';
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorText').textContent = 'Network error. Please check your connection and try again.';
                errorMessage.style.display = 'block';

                submitBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
