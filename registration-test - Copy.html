<!DOCTYPE html>
<html>
<head>
    <title>Registration Test</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .success { background: #d4edda; color: #155724; padding: 15px; margin: 10px 0; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; margin: 10px 0; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Registration API Test</h1>
    
    <button onclick="testRegistration()">Test Registration</button>
    <button onclick="clearLogs()">Clear Logs</button>
    
    <div id="logs"></div>
    
    <script>
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            
            let className = '';
            if (type === 'success') className = 'success';
            if (type === 'error') className = 'error';
            
            logsDiv.innerHTML += `<div class="${className}"><strong>[${timestamp}] ${type.toUpperCase()}:</strong><pre>${escapeHtml(message)}</pre></div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function testRegistration() {
            const timestamp = Date.now();
            const email = `test${timestamp}@example.com`;
            const national_id = `ID${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
            
            const formData = {
                full_name: 'Test User ' + timestamp,
                email: email,
                national_id: national_id,
                password: 'TestPass123!',
                confirm_password: 'TestPass123!',
                phone: '+1234567890',
                dob: '1990-01-15',
                address: '123 Test Street',
                city: 'Test City',
                state: 'TS',
                zip: '12345'
            };
            
            log('Starting registration test...', 'info');
            log('Email: ' + email, 'info');
            log('National ID: ' + national_id, 'info');
            
            try {
                log('Sending request to API...', 'info');
                
                const response = await fetch('../api/auth.php?action=register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                log('Response status: ' + response.status, 'info');
                
                const responseText = await response.text();
                log('Raw response: ' + responseText, 'info');
                
                const data = JSON.parse(responseText);
                
                if (data.success) {
                    log('✓ Registration successful! Voter ID: ' + data.data.voter_id, 'success');
                } else {
                    log('✗ Registration failed: ' + (data.error || 'Unknown error'), 'error');
                    if (data.errors) {
                        log('Detailed errors: ' + JSON.stringify(data.errors, null, 2), 'error');
                    }
                }
            } catch (error) {
                log('✗ Error: ' + error.message, 'error');
                log('Stack: ' + error.stack, 'error');
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
    </script>
</body>
</html>
