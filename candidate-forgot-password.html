<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Candidate Portal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/api-helper.js"></script>
    <style>
        .password-reset-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .password-reset-container h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }

        .password-reset-container p {
            color: var(--gray-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .btn-submit:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #d1fae5;
            border-left: 4px solid #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message i {
            color: #10b981;
            margin-right: 0.5rem;
        }

        .error-message {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-message i {
            color: #ef4444;
            margin-right: 0.5rem;
        }

        .loading {
            display: none;
        }
    </style>
</head>
<body>
    <div class="password-reset-container">
        <a href="candidate-register.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>

        <h1><i class="fas fa-key"></i> Reset Password</h1>
        <p>Enter your email address and we'll send you a link to reset your password.</p>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <form id="forgotPasswordForm" onsubmit="submitForgotPassword(event)">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" id="email" name="email" required 
                       placeholder="Enter your registered email address"
                       autocomplete="email">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>

            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Sending reset link...
            </div>
        </form>

        <a href="candidate-register.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <script>
        async function submitForgotPassword(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');

            // Clear messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';

            // Show loading
            submitBtn.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(getApiUrl('api/candidate-auth.php?action=forgot_password'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    // Show success message
                    document.getElementById('successText').textContent = 'Password reset link has been sent to your email. Check your inbox for further instructions.';
                    successMessage.style.display = 'block';

                    // Clear form and disable for 5 seconds
                    document.getElementById('email').value = '';
                    submitBtn.disabled = true;

                    setTimeout(() => {
                        submitBtn.style.display = 'block';
                        loading.style.display = 'none';
                        submitBtn.disabled = false;
                    }, 5000);
                } else {
                    // Show error message
                    document.getElementById('errorText').textContent = data.error || 'Failed to send reset link. Please try again.';
                    errorMessage.style.display = 'block';

                    submitBtn.style.display = 'block';
                    loading.style.display = 'none';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorText').textContent = 'Network error. Please check your connection and try again.';
                errorMessage.style.display = 'block';

                submitBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
