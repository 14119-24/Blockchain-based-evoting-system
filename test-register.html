<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 300px; padding: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test Registration Form</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" name="full_name" value="John Test User" required>
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" name="email" value="john@test.com" required>
        </div>
        
        <div class="form-group">
            <label>National ID:</label>
            <input type="text" name="national_id" value="ID123456" required>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" value="TestPass123!" required>
        </div>
        
        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" name="confirm_password" value="TestPass123!" required>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" name="phone" value="+1234567890">
        </div>
        
        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" name="dob" value="1990-01-15">
        </div>
        
        <div class="form-group">
            <label>Address:</label>
            <input type="text" name="address" value="123 Main Street">
        </div>
        
        <div class="form-group">
            <label>City/Constituency:</label>
            <input type="text" name="city" value="New York">
        </div>
        
        <button type="submit">Register</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                full_name: document.querySelector('[name="full_name"]').value,
                email: document.querySelector('[name="email"]').value,
                national_id: document.querySelector('[name="national_id"]').value,
                password: document.querySelector('[name="password"]').value,
                confirm_password: document.querySelector('[name="confirm_password"]').value,
                phone: document.querySelector('[name="phone"]').value || '',
                dob: document.querySelector('[name="dob"]').value || '',
                address: document.querySelector('[name="address"]').value || '',
                city: document.querySelector('[name="city"]').value || '',
                state: '',
                zip: ''
            };
            
            try {
                const response = await fetch('../api/auth.php?action=register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `<h3>✓ Registration Successful!</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<h3>✗ Registration Failed</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<h3>✗ Error</h3><p>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
